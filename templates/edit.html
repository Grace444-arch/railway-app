<!DOCTYPE html>
<html>
<head>
    <title>Edit User</title>
</head>
<body>

<h2>Edit User</h2>

<form method="POST">
    Name:<br>
    <input type="text" name="name" value="{{ user.name }}" required><br><br>

    Email:<br>
    <input type="email" name="email" value="{{ user.email }}" required><br><br>

    <button type="submit">Update</button>
</form>

<a href="/">Back</a>

</body>
</html>
